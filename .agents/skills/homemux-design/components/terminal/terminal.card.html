<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="../../styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0}
  body{background:var(--bg-base);font-family:var(--font-ui);color:var(--text-primary);
    -webkit-font-smoothing:antialiased;padding:22px}
  .previews{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .dots{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
  .dotrow{display:flex;align-items:center;gap:12px;background:var(--surface-1);
    border:1px solid var(--hairline);border-radius:var(--radius-sm);padding:10px 12px}
  .nm{font-size:var(--type-subheadline);font-weight:600}
</style></head><body>
<div id="root"></div>
<script type="text/babel">
const { PaletteDots, ThemePreviewCard } = window.HomeMuxDesignSystem_359607;
const ids=[["homemux-dark","HomeMux Dark"],["ember-console","Ember Console"],["coastline-light","Coastline Light"],["pine-mist","Pine Mist"]];
function Demo(){
  return (<div>
    <div className="dots">
      {ids.map(([id,nm])=>(
        <div className="dotrow" key={id}><PaletteDots theme={id}/><span className="nm">{nm}</span></div>
      ))}
    </div>
    <div className="previews">
      <ThemePreviewCard theme="homemux-dark"/>
      <ThemePreviewCard theme="ember-console"/>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
