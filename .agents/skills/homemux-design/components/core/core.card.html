<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="../../styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0}
  body{background:var(--bg-base);font-family:var(--font-ui);color:var(--text-primary);
    -webkit-font-smoothing:antialiased;padding:22px}
  .grid{display:flex;flex-direction:column;gap:18px}
  .group{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .cap{font-size:10px;text-transform:uppercase;letter-spacing:.07em;font-family:var(--font-mono);
    color:var(--text-tertiary);width:84px;flex:none}
</style></head><body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Badge, KeyCap, StatusDot, Icon } = window.HomeMuxDesignSystem_359607;
function Row({label, children}){return <div className="group"><span className="cap">{label}</span>{children}</div>;}
function Demo(){
  const [ctrl,setCtrl]=React.useState(true);
  return (<div className="grid">
    <Row label="Button">
      <Button variant="prominent">Add First Host</Button>
      <Button variant="bordered">Restore</Button>
      <Button variant="plain">Skip</Button>
      <Button variant="prominent" destructive>Close Session</Button>
      <Button variant="prominent" size="small">Reconnect</Button>
      <Button variant="bordered" disabled>Disabled</Button>
    </Row>
    <Row label="Icon btn">
      <IconButton name="command" label="Command" shape="circle" size={52}/>
      <IconButton name="plus" label="Add" variant="soft"/>
      <IconButton name="settings" label="Settings" variant="plain" tint="var(--text-secondary)"/>
      <IconButton name="rotate-cw" label="Reconnect" variant="soft"/>
      <IconButton name="ellipsis" label="More" variant="plain" tint="var(--text-secondary)"/>
    </Row>
    <Row label="Badge">
      <Badge>SSH</Badge>
      <Badge tint="var(--status-connecting)">Mosh</Badge>
      <Badge tint="var(--accent)">HomeMux Dark</Badge>
      <Badge tint="var(--status-connected)" variant="outline">Connected</Badge>
    </Row>
    <Row label="KeyCap">
      <KeyCap>Esc</KeyCap><KeyCap>Tab</KeyCap>
      <KeyCap active={ctrl} onClick={()=>setCtrl(v=>!v)}>Ctrl</KeyCap>
      <KeyCap>Ctrl-C</KeyCap><KeyCap>↑</KeyCap><KeyCap>↓</KeyCap><KeyCap>Paste</KeyCap>
    </Row>
    <Row label="Status">
      <span style={{display:'inline-flex',alignItems:'center',gap:6}}><StatusDot state="connected"/> Connected</span>
      <span style={{display:'inline-flex',alignItems:'center',gap:6}}><StatusDot state="connecting"/> Connecting</span>
      <span style={{display:'inline-flex',alignItems:'center',gap:6}}><StatusDot state="failed"/> Failed</span>
      <span style={{display:'inline-flex',alignItems:'center',gap:6,color:'var(--accent)'}}><Icon name="terminal" size={18}/> Icon</span>
    </Row>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
