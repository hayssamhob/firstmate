<!-- @dsCard group="Components" viewport="700x360" name="Surfaces — card, row, banner" subtitle="Card · ListRow + IconTile · Banner" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="../../styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0}
  body{background:var(--bg-base);font-family:var(--font-ui);color:var(--text-primary);
    -webkit-font-smoothing:antialiased;padding:22px}
  .grid{display:flex;flex-direction:column;gap:16px}
  .rows{border:1px solid var(--hairline);border-radius:var(--radius-md);overflow:hidden}
  .rows>div+div{border-top:1px solid var(--separator)}
  .cap{font-size:10px;text-transform:uppercase;letter-spacing:.07em;font-family:var(--font-mono);color:var(--text-tertiary)}
</style></head><body>
<div id="root"></div>
<script type="text/babel">
const NS = window.HomeMuxDesignSystem_359607;
const { Card, ListRow, IconTile, Banner, Badge, PaletteDots, Button, Icon } = NS;
function Demo(){
  return (<div className="grid">
    <span className="cap">ListRow · IconTile · trailing</span>
    <div className="rows">
      <ListRow chevron
        leading={<IconTile><Icon name="terminal" size={20}/></IconTile>}
        title="Mac mini · claude"
        subtitle="alex@mac-mini.local"
        detail={<><Icon name="layers" size={13}/> tmux · claude · Automatic</>}
        trailing={<PaletteDots theme="homemux-dark"/>}/>
      <ListRow chevron
        leading={<IconTile background="#120E0B" tint="#FFB06A"><Icon name="terminal" size={20}/></IconTile>}
        title="VPS"
        subtitle="root@example.com:22"
        detail={<><Icon name="key-round" size={13}/> Private Key · Plain shell</>}
        trailing={<Badge>SSH</Badge>}/>
    </div>

    <span className="cap">Banner</span>
    <Banner tone="warning" title="Could not connect"
      message="Mosh appears installed, but UDP could not reach this host."
      action={<Button size="small">Reconnect</Button>}/>
    <Banner tone="accent" icon="clock" title="Trial · 12 days left"
      message="Full access is unlocked during the trial. No terminal features are gated."/>

    <span className="cap">Card · material</span>
    <Card variant="material" accent>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <Icon name="shield-check" color="var(--accent)"/>
        <div><div style={{fontWeight:600}}>Local-first by design</div>
        <div style={{fontSize:'var(--type-footnote)',color:'var(--text-secondary)'}}>Keys stay in Keychain. No account, no cloud vault.</div></div>
      </div>
    </Card>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
