<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg-abyss);font-family:var(--font-mono);-webkit-font-smoothing:antialiased;
    padding:20px;display:flex;gap:8px}
  .sw{flex:1;height:106px;border-radius:var(--radius-sm);display:flex;flex-direction:column;
    justify-content:flex-end;padding:9px;box-sizing:border-box}
  .n{font-size:var(--type-caption2);color:#0A0D12;font-weight:700}
  .h{font-size:9px;color:#0A0D12;opacity:.7}
  .dim .n,.dim .h{color:#F7FAFF;opacity:.85}
</style></head><body>
  <div class="sw dim" style="background:var(--ansi-bright-black)"><div class="n">8 bl.blk</div><div class="h">5A6472</div></div>
  <div class="sw" style="background:var(--ansi-bright-red)"><div class="n">9 red</div><div class="h">FF8F95</div></div>
  <div class="sw" style="background:var(--ansi-bright-green)"><div class="n">10 grn</div><div class="h">8AF0BB</div></div>
  <div class="sw" style="background:var(--ansi-bright-yellow)"><div class="n">11 yel</div><div class="h">F9D99A</div></div>
  <div class="sw" style="background:var(--ansi-bright-blue)"><div class="n">12 blu</div><div class="h">9BB8FF</div></div>
  <div class="sw" style="background:var(--ansi-bright-magenta)"><div class="n">13 mag</div><div class="h">D9A5F2</div></div>
  <div class="sw" style="background:var(--ansi-bright-cyan)"><div class="n">14 cyn</div><div class="h">8BEAF0</div></div>
  <div class="sw" style="background:var(--ansi-bright-white)"><div class="n">15 wht</div><div class="h">F7FAFF</div></div>
</body></html>
