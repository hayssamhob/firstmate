<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing grid" subtitle="2pt base · screen + card insets" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-ui);
    -webkit-font-smoothing:antialiased;padding:22px;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
  .c{display:flex;flex-direction:column;align-items:center;gap:7px}
  .bar{background:var(--accent);border-radius:3px;width:var(--w);height:30px;box-shadow:0 0 14px var(--accent-glow)}
  .l{font-family:var(--font-mono);font-size:var(--type-caption2);color:var(--text-secondary)}
</style></head><body>
  <div class="c"><div class="bar" style="--w:4px"></div><span class="l">2</span></div>
  <div class="c"><div class="bar" style="--w:8px"></div><span class="l">4</span></div>
  <div class="c"><div class="bar" style="--w:12px"></div><span class="l">6</span></div>
  <div class="c"><div class="bar" style="--w:16px"></div><span class="l">8</span></div>
  <div class="c"><div class="bar" style="--w:24px"></div><span class="l">12</span></div>
  <div class="c"><div class="bar" style="--w:32px"></div><span class="l">16</span></div>
  <div class="c"><div class="bar" style="--w:40px"></div><span class="l">20</span></div>
  <div class="c"><div class="bar" style="--w:48px"></div><span class="l">24</span></div>
  <div class="c"><div class="bar" style="--w:64px"></div><span class="l">32</span></div>
</body></html>
