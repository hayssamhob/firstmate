<!-- @dsCard group="Colors" viewport="700x150" name="Status semantics" subtitle="Connection states — dot + capsule usage" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg-base);font-family:var(--font-ui);color:var(--text-primary);
    -webkit-font-smoothing:antialiased;padding:22px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .chip{display:flex;align-items:center;gap:9px;background:var(--surface-1);border:1px solid var(--hairline);
    border-radius:var(--radius-pill);padding:9px 15px 9px 12px}
  .dot{width:10px;height:10px;border-radius:50%}
  .lab{font-size:var(--type-subheadline);font-weight:var(--weight-semibold)}
  .hex{font-family:var(--font-mono);font-size:var(--type-caption2);color:var(--text-tertiary)}
</style></head><body>
  <div class="chip"><span class="dot" style="background:var(--status-connected);box-shadow:0 0 6px var(--status-connected)"></span>
    <span class="lab">Connected</span><span class="hex">#67E8A5</span></div>
  <div class="chip"><span class="dot" style="background:var(--status-connecting);box-shadow:0 0 6px var(--status-connecting)"></span>
    <span class="lab">Connecting</span><span class="hex">#F6C177</span></div>
  <div class="chip"><span class="dot" style="background:var(--status-failed);box-shadow:0 0 6px var(--status-failed)"></span>
    <span class="lab">Failed</span><span class="hex">#FF6B72</span></div>
  <div class="chip"><span class="dot" style="background:var(--status-info)"></span>
    <span class="lab">Info</span><span class="hex">#7AA2FF</span></div>
</body></html>
