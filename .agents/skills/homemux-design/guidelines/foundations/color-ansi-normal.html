<!-- @dsCard group="Colors" viewport="700x150" name="ANSI — normal" subtitle="HomeMux Dark terminal palette · colors 0–7" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg-abyss);font-family:var(--font-mono);-webkit-font-smoothing:antialiased;
    padding:20px;display:flex;gap:8px}
  .sw{flex:1;height:106px;border-radius:var(--radius-sm);display:flex;flex-direction:column;
    justify-content:flex-end;padding:9px;box-sizing:border-box}
  .n{font-size:var(--type-caption2);color:#0A0D12;font-weight:700}
  .h{font-size:9px;color:#0A0D12;opacity:.7}
  .dim .n,.dim .h{color:#F7FAFF;opacity:.85}
</style></head><body>
  <div class="sw dim" style="background:var(--ansi-black)"><div class="n">0 black</div><div class="h">151A22</div></div>
  <div class="sw" style="background:var(--ansi-red)"><div class="n">1 red</div><div class="h">FF6B72</div></div>
  <div class="sw" style="background:var(--ansi-green)"><div class="n">2 green</div><div class="h">67E8A5</div></div>
  <div class="sw" style="background:var(--ansi-yellow)"><div class="n">3 yellow</div><div class="h">F6C177</div></div>
  <div class="sw" style="background:var(--ansi-blue)"><div class="n">4 blue</div><div class="h">7AA2FF</div></div>
  <div class="sw" style="background:var(--ansi-magenta)"><div class="n">5 mag</div><div class="h">C792EA</div></div>
  <div class="sw" style="background:var(--ansi-cyan)"><div class="n">6 cyan</div><div class="h">5EDDE6</div></div>
  <div class="sw" style="background:var(--ansi-white)"><div class="n">7 white</div><div class="h">DDE5F1</div></div>
</body></html>
