<!-- @dsCard group="Brand" viewport="700x300" name="App icon & wordmark" subtitle="Gable roof + two columns — many connections, one home" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg-base);font-family:var(--font-ui);color:var(--text-primary);
    -webkit-font-smoothing:antialiased;padding:28px;display:flex;align-items:center;gap:36px;flex-wrap:wrap}
  .tile{width:148px;height:148px;border-radius:34px;overflow:hidden;box-shadow:var(--shadow-card)}
  .tile svg{width:100%;height:100%;display:block}
  .minis{display:flex;align-items:flex-end;gap:14px}
  .mini{border-radius:13px;overflow:hidden}
  .mini.s{width:56px;height:56px}.mini.xs{width:36px;height:36px}
  .mini svg{width:100%;height:100%;display:block}
  .stack{display:flex;flex-direction:column;gap:18px}
  .word{display:flex;align-items:center;gap:13px}
  .word .g{width:38px;height:38px;color:var(--accent)}
  .word .g svg{width:100%;height:100%}
  .wt{font-size:30px;font-weight:var(--weight-bold);letter-spacing:var(--tracking-tight)}
  .wt b{color:var(--accent);font-weight:var(--weight-bold)}
  .cap{font-size:var(--type-caption);color:var(--text-tertiary);font-family:var(--font-mono)}
</style></head><body>
  <div class="tile">
    <svg viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bg" cx="42%" cy="33%" r="88%"><stop offset="0%" stop-color="#12171F"/><stop offset="58%" stop-color="#0A0D12"/><stop offset="100%" stop-color="#06080C"/></radialGradient>
        <linearGradient id="mk" x1="300" y1="300" x2="724" y2="724" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#8FFAC4"/><stop offset="100%" stop-color="#5EEAD4"/></linearGradient>
        <filter id="gl" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="18" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <rect width="1024" height="1024" fill="url(#bg)"/>
      <g filter="url(#gl)">
        <path d="M300 474 L 512 312 L 724 474" stroke="url(#mk)" stroke-width="74" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <rect x="414" y="548" width="72" height="168" rx="16" fill="url(#mk)"/>
        <rect x="538" y="548" width="72" height="168" rx="16" fill="url(#mk)"/>
      </g>
    </svg>
  </div>

  <div class="minis">
    <div class="mini s"><svg viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="1024" height="1024" fill="#0A0D12"/><g><path d="M300 474 L 512 312 L 724 474" stroke="#7CF7B6" stroke-width="82" stroke-linecap="round" stroke-linejoin="round" fill="none"/><rect x="410" y="548" width="76" height="168" rx="16" fill="#7CF7B6"/><rect x="538" y="548" width="76" height="168" rx="16" fill="#7CF7B6"/></g></svg></div>
    <div class="mini xs"><svg viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="1024" height="1024" fill="#0A0D12"/><g><path d="M296 478 L 512 308 L 728 478" stroke="#7CF7B6" stroke-width="92" stroke-linecap="round" stroke-linejoin="round" fill="none"/><rect x="404" y="548" width="80" height="170" rx="18" fill="#7CF7B6"/><rect x="540" y="548" width="80" height="170" rx="18" fill="#7CF7B6"/></g></svg></div>
  </div>

  <div class="stack">
    <div class="word">
      <span class="g"><svg viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M300 474 L 512 312 L 724 474" stroke="currentColor" stroke-width="74" stroke-linecap="round" stroke-linejoin="round" fill="none"/><rect x="414" y="548" width="72" height="168" rx="16" fill="currentColor"/><rect x="538" y="548" width="72" height="168" rx="16" fill="currentColor"/></svg></span>
      <span class="wt">Home<b>Mux</b></span>
    </div>
    <div class="cap">accent #7CF7B6 · radial canvas · two columns, one roof</div>
  </div>
</body></html>
