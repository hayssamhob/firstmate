<!-- @dsCard group="Spacing" viewport="700x180" name="Materials & blur" subtitle="Translucent bars and floating chrome over the terminal" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0}
  body{margin:0;font-family:var(--font-ui);color:var(--text-primary);-webkit-font-smoothing:antialiased;
    height:180px;position:relative;overflow:hidden;
    background:var(--bg-abyss);font-size:var(--type-footnote)}
  .term{position:absolute;inset:0;font-family:var(--font-mono);font-size:13px;line-height:1.5;
    padding:14px;color:var(--ansi-bright-green);opacity:.55;white-space:pre}
  .layer{position:absolute;left:22px;right:22px;border:1px solid var(--hairline);border-radius:var(--radius-md);
    padding:13px 16px;display:flex;align-items:center;gap:10px;font-weight:var(--weight-semibold)}
  .regular{top:34px;background:var(--material-regular);-webkit-backdrop-filter:var(--blur-regular);backdrop-filter:var(--blur-regular)}
  .bar{top:104px;background:var(--material-bar);-webkit-backdrop-filter:var(--blur-thin);backdrop-filter:var(--blur-thin)}
  .tag{font-family:var(--font-mono);font-size:var(--type-caption2);color:var(--text-tertiary);margin-left:auto}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--status-connected);box-shadow:0 0 6px var(--status-connected)}
</style></head><body>
  <div class="term">❯ npm run build
  ✓ compiled 248 modules
  ❯ tmux attach -t claude
  running tests…  ███████░░░  72%</div>
  <div class="layer regular"><span class="dot"></span>Connected · regularMaterial<span class="tag">--material-regular · blur 20</span></div>
  <div class="layer bar">Keyboard accessory · bar<span class="tag">--material-bar · blur 14</span></div>
</body></html>
