<!-- @dsCard group="Colors" viewport="700x150" name="Dark canvas & surfaces" subtitle="Near-black depths the whole app is built on" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg-base);font-family:var(--font-ui);color:var(--text-primary);
    -webkit-font-smoothing:antialiased;padding:20px;display:flex;gap:10px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;justify-content:flex-end;width:122px;height:108px;
    border-radius:var(--radius-md);padding:11px;box-sizing:border-box;border:1px solid var(--hairline)}
  .name{font-size:var(--type-footnote);font-weight:var(--weight-semibold)}
  .hex{font-family:var(--font-mono);font-size:var(--type-caption2);color:var(--text-secondary);margin-top:2px}
</style></head><body>
  <div class="sw" style="background:var(--bg-abyss)"><div class="name">abyss</div><div class="hex">#0A0D12</div></div>
  <div class="sw" style="background:var(--bg-base)"><div class="name">base</div><div class="hex">#0B0E14</div></div>
  <div class="sw" style="background:var(--surface-1)"><div class="name">surface-1</div><div class="hex">#11151C</div></div>
  <div class="sw" style="background:var(--surface-2)"><div class="name">surface-2</div><div class="hex">#171C26</div></div>
  <div class="sw" style="background:var(--surface-3)"><div class="name">surface-3</div><div class="hex">#1F2632</div></div>
</body></html>
