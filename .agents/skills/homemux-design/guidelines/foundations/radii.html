<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="Continuous corners · keycap → onboarding well" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-ui);
    -webkit-font-smoothing:antialiased;padding:22px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
  .c{display:flex;flex-direction:column;align-items:center;gap:7px}
  .box{width:74px;height:74px;background:var(--surface-2);border:1px solid var(--accent-line);
    box-shadow:inset 0 0 0 1px var(--hairline)}
  .l{font-family:var(--font-mono);font-size:var(--type-caption2);color:var(--text-secondary)}
</style></head><body>
  <div class="c"><div class="box" style="border-radius:8px"></div><span class="l">xs · 8</span></div>
  <div class="c"><div class="box" style="border-radius:12px"></div><span class="l">sm · 12</span></div>
  <div class="c"><div class="box" style="border-radius:16px"></div><span class="l">md · 16</span></div>
  <div class="c"><div class="box" style="border-radius:20px"></div><span class="l">lg · 20</span></div>
  <div class="c"><div class="box" style="border-radius:24px"></div><span class="l">xl · 24</span></div>
  <div class="c"><div class="box" style="border-radius:28px"></div><span class="l">2xl · 28</span></div>
  <div class="c"><div class="box" style="border-radius:34px"></div><span class="l">3xl · 34</span></div>
</body></html>
