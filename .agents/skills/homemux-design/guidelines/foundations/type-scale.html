<!-- @dsCard group="Type" viewport="700x220" name="Type scale" subtitle="iOS scale · large-title → caption2" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-ui);
    -webkit-font-smoothing:antialiased;padding:22px;display:grid;grid-template-columns:1fr 1fr;
    gap:4px 28px;align-content:start}
  .row{display:flex;align-items:baseline;gap:10px;padding:3px 0;border-bottom:1px solid var(--separator)}
  .name{font-size:var(--type-footnote);color:var(--text-secondary);width:96px;flex:none}
  .val{font-family:var(--font-mono);font-size:var(--type-caption2);color:var(--text-tertiary);margin-left:auto}
  .s{font-weight:var(--weight-semibold)}
</style></head><body>
  <div class="row"><span class="name">large-title</span><span class="s" style="font-size:22px">Aa</span><span class="val">34/700</span></div>
  <div class="row"><span class="name">title1</span><span class="s" style="font-size:20px">Aa</span><span class="val">28/600</span></div>
  <div class="row"><span class="name">title2</span><span class="s" style="font-size:19px">Aa</span><span class="val">22/600</span></div>
  <div class="row"><span class="name">title3</span><span class="s" style="font-size:18px">Aa</span><span class="val">20/600</span></div>
  <div class="row"><span class="name">headline</span><span class="s" style="font-size:17px">Aa</span><span class="val">17/600</span></div>
  <div class="row"><span class="name">body</span><span style="font-size:17px">Aa</span><span class="val">17/400</span></div>
  <div class="row"><span class="name">callout</span><span style="font-size:16px">Aa</span><span class="val">16/400</span></div>
  <div class="row"><span class="name">subheadline</span><span style="font-size:15px">Aa</span><span class="val">15/400</span></div>
  <div class="row"><span class="name">footnote</span><span style="font-size:13px">Aa</span><span class="val">13/400</span></div>
  <div class="row"><span class="name">caption</span><span style="font-size:12px">Aa</span><span class="val">12/400</span></div>
  <div class="row"><span class="name">caption2</span><span style="font-size:11px">Aa</span><span class="val">11/400</span></div>
</body></html>
