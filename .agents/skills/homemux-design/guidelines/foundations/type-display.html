<!-- @dsCard group="Type" viewport="700x190" name="Display & titles" subtitle="IBM Plex Sans · large-title and title weights" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-ui);
    -webkit-font-smoothing:antialiased;padding:24px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;align-items:baseline;gap:14px}
  .meta{font-family:var(--font-mono);font-size:var(--type-caption2);color:var(--text-tertiary);margin-left:auto}
  .lt{font-size:var(--type-large-title);font-weight:var(--weight-bold);letter-spacing:var(--tracking-tight)}
  .t2{font-size:var(--type-title2);font-weight:var(--weight-semibold)}
  .hl{font-size:var(--type-headline);font-weight:var(--weight-semibold)}
</style></head><body>
  <div class="row"><span class="lt">Your home terminal</span><span class="meta">34 / bold</span></div>
  <div class="row"><span class="t2">One tap back into tmux</span><span class="meta">22 / semibold</span></div>
  <div class="row"><span class="hl">Mac mini · claude</span><span class="meta">17 / semibold · headline</span></div>
</body></html>
