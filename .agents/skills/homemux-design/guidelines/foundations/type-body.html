<!-- @dsCard group="Type" viewport="700x180" name="Body & secondary" subtitle="IBM Plex Sans · body, subheadline, footnote, caption" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-ui);
    -webkit-font-smoothing:antialiased;padding:24px;display:flex;flex-direction:column;gap:9px}
  .row{display:flex;align-items:baseline;gap:14px}
  .meta{font-family:var(--font-mono);font-size:var(--type-caption2);color:var(--text-tertiary);margin-left:auto}
  .body{font-size:var(--type-body)}
  .sub{font-size:var(--type-subheadline);color:var(--text-secondary)}
  .foot{font-size:var(--type-footnote);color:var(--text-secondary)}
  .cap{font-size:var(--type-caption);color:var(--text-tertiary)}
</style></head><body>
  <div class="row"><span class="body">Add your Mac mini, workstation, or homelab server.</span><span class="meta">17 · body</span></div>
  <div class="row"><span class="sub">Keys stay in Keychain. No account, no cloud vault.</span><span class="meta">15 · subheadline</span></div>
  <div class="row"><span class="foot">Tap a host to reconnect. Swipe for edit and delete.</span><span class="meta">13 · footnote</span></div>
  <div class="row"><span class="cap">tmux · claude · Automatic</span><span class="meta">12 · caption</span></div>
</body></html>
